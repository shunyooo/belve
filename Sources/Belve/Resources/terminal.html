<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
/* XTERM_CSS */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; -webkit-user-select: none; user-select: none; }
#terminal { width: 100%; height: 100%; }
/* macOS-style overlay scrollbar */
.xterm-viewport::-webkit-scrollbar { width: 8px; }
.xterm-viewport::-webkit-scrollbar-track { background: transparent; }
.xterm-viewport::-webkit-scrollbar-thumb {
	background: rgba(255, 255, 255, 0.15);
	border-radius: 4px;
	border: 2px solid transparent;
	background-clip: content-box;
}
.xterm-viewport::-webkit-scrollbar-thumb:hover {
	background: rgba(255, 255, 255, 0.3);
	background-clip: content-box;
}
.xterm-viewport::-webkit-scrollbar-corner { background: transparent; }
</style>
</head>
<body>
<div id="terminal"></div>
<script>
/* TERMINAL_JS */
</script>
</body>
</html>
