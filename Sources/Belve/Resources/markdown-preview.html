<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<style>
		:root {
			color-scheme: dark;
			--bg: #1a1b26;
			--fg: #c0caf5;
			--fg-muted: #9aa5ce;
			--border: #2c2f3a;
			--accent: #7aa2f7;
			--code-bg: #1f2030;
		}
		html, body {
			margin: 0;
			padding: 0;
			background: var(--bg);
			color: var(--fg);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			font-size: 14px;
			line-height: 1.65;
		}
		#preview {
			max-width: 760px;
			margin: 0 auto;
			padding: 24px 32px 80px;
		}
		#preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
			color: var(--fg);
			line-height: 1.25;
			margin: 1.4em 0 0.6em;
			font-weight: 600;
		}
		#preview h1 { font-size: 1.8em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
		#preview h2 { font-size: 1.45em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
		#preview h3 { font-size: 1.2em; }
		#preview p { margin: 0.7em 0; }
		#preview a { color: var(--accent); text-decoration: none; }
		#preview a:hover { text-decoration: underline; }
		#preview code {
			background: var(--code-bg);
			padding: 0.15em 0.4em;
			border-radius: 4px;
			font-family: ui-monospace, SF Mono, monospace;
			font-size: 0.92em;
		}
		#preview pre {
			background: var(--code-bg);
			padding: 12px 16px;
			border-radius: 6px;
			overflow-x: auto;
		}
		#preview pre code { background: transparent; padding: 0; font-size: 0.88em; }
		#preview blockquote {
			border-left: 3px solid var(--border);
			margin: 1em 0;
			padding: 0.2em 1em;
			color: var(--fg-muted);
		}
		#preview ul, #preview ol { padding-left: 1.6em; }
		#preview li { margin: 0.2em 0; }
		#preview table { border-collapse: collapse; margin: 1em 0; }
		#preview th, #preview td {
			border: 1px solid var(--border);
			padding: 6px 12px;
		}
		#preview th { background: var(--code-bg); }
		#preview hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
		#preview img { max-width: 100%; border-radius: 4px; }
	</style>
</head>
<body>
	<div id="preview"></div>
	<script>/* MARKDOWN_PREVIEW_JS */</script>
</body>
</html>
