name: Build REH Server

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-reh-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: |
          npm ci
          cd remote && npm ci

      - name: Build REH (linux-x64)
        run: |
          NODE_OPTIONS="--experimental-strip-types" \
          node --max-old-space-size=8192 \
          ./node_modules/gulp/bin/gulp.js vscode-reh-linux-x64

      - name: Verify native modules
        run: |
          echo "=== node-pty ==="
          file ../vscode-reh-linux-x64/node_modules/node-pty/build/Release/pty.node
          echo "=== @parcel/watcher ==="
          file ../vscode-reh-linux-x64/node_modules/@parcel/watcher/build/Release/watcher.node
          echo "=== server binary ==="
          ls -la ../vscode-reh-linux-x64/bin/

      - name: Package REH
        run: |
          cd ..
          tar -czf dock-code-reh-linux-x64.tar.gz vscode-reh-linux-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dock-code-reh-linux-x64
          path: ../dock-code-reh-linux-x64.tar.gz
          retention-days: 30

      - name: Create/Update Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_FULL=$(git rev-parse HEAD)
          TAG="reh-${COMMIT_SHORT}"

          # Create release with the REH tarball
          gh release create "${TAG}" \
            --title "REH Server ${COMMIT_SHORT}" \
            --notes "Auto-built REH server for commit ${COMMIT_FULL}" \
            --latest \
            ../dock-code-reh-linux-x64.tar.gz \
            || gh release upload "${TAG}" ../dock-code-reh-linux-x64.tar.gz --clobber

  build-reh-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: |
          npm ci
          cd remote && npm ci

      - name: Build REH (linux-arm64)
        run: |
          NODE_OPTIONS="--experimental-strip-types" \
          node --max-old-space-size=8192 \
          ./node_modules/gulp/bin/gulp.js vscode-reh-linux-arm64

      - name: Package REH
        run: |
          cd ..
          tar -czf dock-code-reh-linux-arm64.tar.gz vscode-reh-linux-arm64/

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          TAG="reh-${COMMIT_SHORT}"

          # Wait for linux-x64 job to create the release, then upload
          for i in $(seq 1 30); do
            gh release upload "${TAG}" ../dock-code-reh-linux-arm64.tar.gz --clobber 2>/dev/null && break
            sleep 10
          done
